{{- $root := . -}}
{{- $d := .Values.defaults -}}
{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "goktug.labels" $root | nindent 4 }}
    {{- include "goktug.selectorLabels" (dict "name" $name "root" $root) | nindent 4 }}
spec:
  replicas: {{ default $d.replicas $svc.replicas }}
  revisionHistoryLimit: {{ $d.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "goktug.selectorLabels" (dict "name" $name "root" $root) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "goktug.selectorLabels" (dict "name" $name "root" $root) | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: {{ $svc.port | quote }}
    spec:
      {{- with $root.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ include "goktug.image" (dict "name" $name "svc" $svc "root" $root) }}
          imagePullPolicy: {{ $root.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          envFrom:
            - configMapRef:
                name: goktug-shared-env
            - secretRef:
                name: {{ $root.Values.secretName }}
                optional: true
          {{- with $svc.env }}
          env:
            {{- range $k, $v := . }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ include "goktug.healthPath" (dict "svc" $svc "root" $root "kind" "liveness") }}
              port: {{ $svc.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: {{ include "goktug.healthPath" (dict "svc" $svc "root" $root "kind" "readiness") }}
              port: {{ $svc.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml (default $d.resources $svc.resources) | nindent 12 }}
{{- end }}
