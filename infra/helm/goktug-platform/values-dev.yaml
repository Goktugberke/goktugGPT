# Dev ortamı — tek replica, düşük kaynak, HPA kapalı, latest tag.
#   helm upgrade --install goktug ./infra/helm/goktug-platform -f values-dev.yaml
global:
  imageTag: latest
  imagePullPolicy: Always       # dev'de her zaman en güncel build

defaults:
  replicas: 1
  resources:
    requests: { cpu: "50m",  memory: "192Mi" }
    limits:   { cpu: "400m", memory: "512Mi" }
  hpa:
    enabled: false

ingress:
  enabled: true
  host: goktug.local
  tls: false
