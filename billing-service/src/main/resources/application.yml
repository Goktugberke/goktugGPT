server:
  port: 8080

spring:
  application:
    name: billing-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres-billing}:${DB_PORT:5432}/${DB_NAME:billing_db}
    username: ${DB_USER:billing}
    password: ${DB_PASSWORD:billing_pw}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:kafka:29092}
    consumer:
      group-id: billing-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.fasterxml.jackson.databind.JsonNode
        spring.json.trusted.packages: "*"
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

billing:
  free-plan:
    name: "free"
    monthly-token-quota: 100000
    rate-limit-capacity: 1000
    rate-limit-refill-per-sec: 10.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
