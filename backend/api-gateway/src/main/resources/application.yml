server:
  port: 8080

spring:
  application:
    name: api-gateway

  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configserver:http://config-server:8888}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  security:
    oauth2:
      resourceserver:
        jwt:
          # Use jwk-set-uri instead of issuer-uri to skip the strict issuer
          # match. Container-internal Keycloak URL (http://keycloak:8080)
          # is used to fetch keys, but JWT tokens carry iss="http://localhost:..."
          # because Keycloak is exposed on a different host:port to browsers.
          # Issuer claim is still verified by Spring; we relax that via
          # `jwk-set-uri` only and let the audience / signature check stand.
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8080/realms/goktuggpt/protocol/openid-connect/certs}

  cloud:
    # Disable Spring Cloud / Spring Boot compatibility check.
    # Spring Cloud 5.x (2025.x) targets Boot 3.5.x but works fine on Boot 3.3.x
    # for the gateway routing features we use. We bypass the guard explicitly.
    compatibility-verifier:
      enabled: false
    gateway:
      # RequestRateLimiter geçici olarak kaldırıldı: Spring Cloud Gateway'in
      # bu sürümü HttpHeaders.headerSet() (Spring 6.2 API) çağırıyordu,
      # bizde Spring 6.1 var -> NoSuchMethodError ile her request ölüyordu.
      # Boot 3.5.x'e yükseltince geri eklenir.

      routes:
        - id: identity-service
          uri: http://identity-service:8081
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**

        - id: conversation-service
          uri: http://conversation-service:8082
          predicates:
            - Path=/api/v1/chats/**

        - id: inference-orchestrator
          uri: http://inference-orchestrator:8083
          predicates:
            - Path=/api/v1/inference/**
          # SSE/streaming için response timeout büyük tut
          metadata:
            response-timeout: 600000   # 10 dk

        - id: asset-service
          uri: http://asset-service:8084
          predicates:
            - Path=/api/v1/assets/**

        - id: billing-service
          uri: http://billing-service:8080
          predicates:
            - Path=/api/v1/billing/**

# Resilience4j circuit breaker — downstream servisler için
resilience4j:
  circuitbreaker:
    instances:
      default:
        slidingWindowSize: 50
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, gateway
  metrics:
    tags:
      application: ${spring.application.name}

# OpenTelemetry → Jaeger
otel:
  exporter:
    otlp:
      endpoint: http://jaeger:4317
  service:
    name: api-gateway

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-} spanId=%X{spanId:-}]"
