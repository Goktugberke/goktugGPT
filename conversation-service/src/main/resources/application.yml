server:
  port: 8082

spring:
  application:
    name: conversation-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/conversation_db}
    username: ${DB_USER:conversation}
    password: ${DB_PASSWORD:conversation_pw}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      enable-idempotence: true
    consumer:
      group-id: conversation-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

# Outbox poller config
outbox:
  poll-interval-ms: 1000
  batch-size: 50

resilience4j:
  circuitbreaker:
    instances:
      elasticsearch:
        slidingWindowSize: 30
        failureRateThreshold: 60
        waitDurationInOpenState: 20s
        slowCallDurationThreshold: 1s
      kafka-publish:
        slidingWindowSize: 50
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
  retry:
    instances:
      kafka-publish:
        maxAttempts: 5
        waitDuration: 500ms
        exponentialBackoffMultiplier: 2

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

otel:
  exporter:
    otlp:
      endpoint: http://jaeger:4317
  service:
    name: conversation-service
