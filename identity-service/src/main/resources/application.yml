server:
  port: 8081

spring:
  application:
    name: identity-service

  # Config Server: shared/env config'i Git'ten çek. "optional:" prefix'i
  # config-server down olunca service'in yine de boot etmesini sağlar
  # (default'lar üzerinden çalışmaya devam).
  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configserver:http://config-server:8888}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/identity_db}
    username: ${DB_USER:identity}
    password: ${DB_PASSWORD:identity_pw}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all                # at-least-once delivery
      enable-idempotence: true # exactly-once-ish on producer side

# Keycloak admin client config (Faz 1: identity-service Keycloak'ı yönetir)
keycloak:
  base-url: ${KEYCLOAK_BASE_URL:http://localhost:8180}
  realm: goktuggpt
  admin-client-id: goktuggpt-internal
  admin-client-secret: ${KEYCLOAK_ADMIN_SECRET:internal-dev-secret-change-in-prod}

resilience4j:
  circuitbreaker:
    instances:
      keycloak:
        slidingWindowSize: 50
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        slowCallDurationThreshold: 3s
        slowCallRateThreshold: 80
  retry:
    instances:
      keycloak:
        maxAttempts: 3
        waitDuration: 200ms
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException$ServiceUnavailable
          - org.springframework.web.reactive.function.client.WebClientRequestException
  timelimiter:
    instances:
      keycloak:
        timeoutDuration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  # Spring-native tracing (Micrometer → OTLP HTTP). Diğer servisler javaagent
  # kullanıyor (gRPC 4317); identity agent'sız olduğu için Micrometer'in OTLP
  # HTTP exporter'ı (4318) ile gönderir. Bu key'ler SADECE identity'de — shared
  # config'e konulsa agent servislerinde çift export'a yol açardı.
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_HTTP_ENDPOINT:http://jaeger:4318/v1/traces}

otel:
  exporter:
    otlp:
      endpoint: http://jaeger:4317
  service:
    name: identity-service
