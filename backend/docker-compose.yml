# goktugGPT Platform — Local Development Stack
#
# Tüm altyapı + faz 1 servisleri tek komutla ayağa kaldırır.
# Servisleri henüz iskeletini kurmadıysan sadece infra'yı kaldır:
#   docker compose -f docker-compose.yml --profile infra up -d
#
# Hepsini ayağa kaldır:
#   docker compose up -d --build
#
# Tek bir servis:
#   docker compose up -d --build conversation-service
#
# UI'lara erişim:
#   Keycloak:    http://localhost:8180   (admin / admin)
#   MinIO:       http://localhost:9090   (minio / minio12345)
#   Jaeger:      http://localhost:16686
#   Prometheus:  http://localhost:9000
#   Grafana:     http://localhost:3000   (admin / admin)
#   Kafka UI:    http://localhost:8090
#   API Gateway: http://localhost:8080

name: goktuggpt-platform

networks:
  goktug-net:
    driver: bridge

volumes:
  postgres-identity-data:
  postgres-conversation-data:
  postgres-inference-data:
  postgres-asset-data:
  postgres-billing-data:
  postgres-keycloak-data:
  redis-data:
  minio-data:
  kafka-data:
  zookeeper-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:

services:
  # ============================================================
  #  INFRA — DATABASES (Database-per-Service kuralı)
  # ============================================================

  postgres-identity:
    image: postgres:16-alpine
    profiles: ["infra", "all"]
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: identity_pw
    volumes:
      - postgres-identity-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks: [goktug-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity -d identity_db"]
      interval: 5s
      retries: 5

  postgres-conversation:
    image: postgres:16-alpine
    profiles: ["infra", "all"]
    environment:
      POSTGRES_DB: conversation_db
      POSTGRES_USER: conversation
      POSTGRES_PASSWORD: conversation_pw
    volumes:
      - postgres-conversation-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks: [goktug-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conversation -d conversation_db"]
      interval: 5s
      retries: 5

  postgres-inference:
    image: postgres:16-alpine
    profiles: ["infra", "all"]
    environment:
      POSTGRES_DB: inference_db
      POSTGRES_USER: inference
      POSTGRES_PASSWORD: inference_pw
    volumes:
      - postgres-inference-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks: [goktug-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inference -d inference_db"]
      interval: 5s
      retries: 5

  postgres-asset:
    image: postgres:16-alpine
    profiles: ["infra", "all"]
    environment:
      POSTGRES_DB: asset_db
      POSTGRES_USER: asset
      POSTGRES_PASSWORD: asset_pw
    volumes:
      - postgres-asset-data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    networks: [goktug-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asset -d asset_db"]
      interval: 5s
      retries: 5

  postgres-billing:
    image: postgres:16-alpine
    profiles: ["infra", "all"]
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing_pw
    volumes:
      - postgres-billing-data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    networks: [goktug-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing -d billing_db"]
      interval: 5s
      retries: 5

  postgres-keycloak:
    image: postgres:16-alpine
    profiles: ["infra", "all"]
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pw
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data
    networks: [goktug-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      retries: 5

  # ============================================================
  #  INFRA — IAM
  # ============================================================

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    profiles: ["infra", "all"]
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pw
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks: [goktug-net]
    healthcheck:
      # Keycloak 25's built-in /health/ready endpoint on management port 9000
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'UP'"]
      interval: 10s
      retries: 20
      start_period: 30s

  # ============================================================
  #  INFRA — CACHE / RATE LIMIT / SESSION
  # ============================================================

  redis:
    image: redis:7-alpine
    profiles: ["infra", "all"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks: [goktug-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ============================================================
  #  INFRA — EVENT BUS (Kafka)
  # ============================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    profiles: ["infra", "all"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks: [goktug-net]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/2181'"]
      interval: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    profiles: ["infra", "all"]
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    networks: [goktug-net]
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      retries: 15
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    profiles: ["infra", "all"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      # Apicurio Schema Registry'yi Kafka-UI'a tanıt (schema sekmesi)
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8080/apis/ccompat/v7
    ports:
      - "8090:8080"
    depends_on:
      - kafka
    networks: [goktug-net]

  # ============================================================
  #  SCHEMA REGISTRY (Apicurio — JSON Schema native)
  # ============================================================
  #  Event şemaları (schemas/events/*.json) burada versiyonlanır ve
  #  BACKWARD compatibility kuralıyla korunur. Kayıt: scripts/register-schemas.ps1
  #  REST API: http://localhost:8086/apis/registry/v2
  #  Confluent-uyumlu API: http://localhost:8086/apis/ccompat/v7
  #  UI: http://localhost:8086/ui
  schema-registry:
    image: apicurio/apicurio-registry-mem:2.5.11.Final
    profiles: ["infra", "all"]
    environment:
      QUARKUS_HTTP_CORS_ORIGINS: "*"
    ports:
      - "8086:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/apis/registry/v2/system/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [goktug-net]

  # ============================================================
  #  INFRA — BLOB STORAGE (S3-compatible)
  # ============================================================

  minio:
    image: minio/minio:latest
    profiles: ["infra", "all"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"   # S3 API
      - "9090:9001"   # Web Console
    volumes:
      - minio-data:/data
    networks: [goktug-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    profiles: ["infra", "all"]
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set local http://minio:9000 minio minio12345;
      /usr/bin/mc mb -p local/gpt-assets || true;
      /usr/bin/mc anonymous set download local/gpt-assets || true;
      echo 'MinIO bucket gpt-assets ready';
      "
    networks: [goktug-net]

  # ============================================================
  #  INFRA — SEARCH (CQRS read model + log analytics)
  # ============================================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    profiles: ["infra", "all"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks: [goktug-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    profiles: ["infra", "all"]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks: [goktug-net]

  # ============================================================
  #  INFRA — OBSERVABILITY (tracing + metrics)
  # ============================================================

  jaeger:
    image: jaegertracing/all-in-one:1.57
    profiles: ["infra", "all"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks: [goktug-net]

  prometheus:
    image: prom/prometheus:latest
    profiles: ["infra", "all"]
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9099:9090"
    networks: [goktug-net]

  grafana:
    image: grafana/grafana:latest
    profiles: ["infra", "all"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks: [goktug-net]

  # ============================================================
  #  APPLICATION SERVICES — FAZ 1
  # ============================================================
  #  Not: her servis kendi Dockerfile'ı tamamlanınca aktive olur.
  #  Şimdi build context tanımlanmış, içi boş olunca `docker compose
  #  build api-gateway` hata verir — bu beklenen durumdur. Servisleri
  #  scaffold ettikçe up edebilirsin.

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    profiles: ["all"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # Default backend = bind-mounted local git repo (file://).
      # GitHub'a geçmek için: CONFIG_GIT_URI=https://github.com/<owner>/<repo>.git
      # ve gerekirse CONFIG_GIT_USERNAME / CONFIG_GIT_PASSWORD (PAT) ver.
      CONFIG_GIT_URI: file:///opt/config-repo
      CONFIG_GIT_BRANCH: main
    volumes:
      # Read-write bind-mount: JGit working copy'de index.lock yazıyor (refresh/
      # checkout sırasında), :ro olunca FileSystemException atıyor. Host'ta
      # config-repo'yu sen edit edersin → git commit; container sadece okuma
      # niyetinde ama JGit bookkeeping yazılarına izin vermek gerek.
      - ./config-repo:/opt/config-repo
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [goktug-net]
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    profiles: ["all"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/goktuggpt/protocol/openid-connect/certs
      REDIS_HOST: redis
      # OpenTelemetry — auto instrumentation via java agent
      OTEL_SERVICE_NAME: api-gateway
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=goktug,service.version=0.1.0,deployment.environment=dev"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "1.0"
    depends_on:
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks: [goktug-net]
    restart: unless-stopped

  identity-service:
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    profiles: ["all"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres-identity:5432/identity_db
      DB_USER: identity
      DB_PASSWORD: identity_pw
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KAFKA_BOOTSTRAP: kafka:29092
      OTEL_SERVICE_NAME: identity-service
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=goktug,service.version=0.1.0,deployment.environment=dev"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    depends_on:
      postgres-identity:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks: [goktug-net]
    restart: unless-stopped

  conversation-service:
    build:
      context: .
      dockerfile: conversation-service/Dockerfile
    profiles: ["all"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres-conversation:5432/conversation_db
      DB_USER: conversation
      DB_PASSWORD: conversation_pw
      KAFKA_BOOTSTRAP: kafka:29092
      ELASTICSEARCH_URI: http://elasticsearch:9200
      OTEL_SERVICE_NAME: conversation-service
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=goktug,service.version=0.1.0,deployment.environment=dev"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    depends_on:
      postgres-conversation:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "8082:8082"
    networks: [goktug-net]
    restart: unless-stopped

  inference-orchestrator:
    build:
      context: .
      dockerfile: inference-orchestrator/Dockerfile
    profiles: ["all"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres-inference:5432/inference_db
      DB_USER: inference
      DB_PASSWORD: inference_pw
      KAFKA_BOOTSTRAP: kafka:29092
      INFERENCE_WORKER_GOKTUG_URL: http://llm-server:9001
      GUARDRAIL_URL: http://guardrail-service:9003
      ROUTER_URL: http://router-service:9002
      BILLING_URL: http://billing-service:8080
      OTEL_SERVICE_NAME: inference-orchestrator
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=goktug,service.version=0.1.0,deployment.environment=dev"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    depends_on:
      postgres-inference:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "8083:8083"
    networks: [goktug-net]
    restart: unless-stopped

  llm-server:
    build:
      context: ./llm-server
      dockerfile: Dockerfile
    profiles: ["all"]
    environment:
      MODEL_PATH: /models/best_model.pt
      TOKENIZER_PATH: /models/tokenizer.json
      DEVICE: cpu  # change to "cuda" if GPU available
      VOCAB_SIZE: "16000"
      N_EMBED: "512"
      N_HEAD: "8"
      N_LAYER: "8"
      MAX_SEQ_LEN: "512"
    volumes:
      - ./llm-server/checkpoints:/models:ro
    ports:
      - "9001:9001"
    networks: [goktug-net]
    restart: unless-stopped

  asset-service:
    build:
      context: .
      dockerfile: asset-service/Dockerfile
    profiles: ["all"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres-asset:5432/asset_db
      DB_USER: asset
      DB_PASSWORD: asset_pw
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      KAFKA_BOOTSTRAP: kafka:29092
      OTEL_SERVICE_NAME: asset-service
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=goktug,service.version=0.1.0,deployment.environment=dev"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    depends_on:
      postgres-asset:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks: [goktug-net]
    restart: unless-stopped

  guardrail-service:
    build: ./guardrail-service
    profiles: ["all"]
    environment:
      USE_ML_MODELS: "${GUARDRAIL_USE_ML:-false}"
      OTEL_SERVICE_NAME: guardrail-service
    ports:
      - "9003:9003"
    networks: [goktug-net]
    restart: unless-stopped

  router-service:
    build: ./router-service
    profiles: ["all"]
    environment:
      USE_EMBEDDINGS: "${ROUTER_USE_EMBEDDINGS:-false}"
      OTEL_SERVICE_NAME: router-service
    ports:
      - "9002:9002"
    networks: [goktug-net]
    restart: unless-stopped

  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    profiles: ["all"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres-billing
      DB_PORT: "5432"
      DB_NAME: billing_db
      DB_USER: billing
      DB_PASSWORD: billing_pw
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP: kafka:29092
      OTEL_SERVICE_NAME: billing-service
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=goktug,service.version=0.1.0,deployment.environment=dev"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    depends_on:
      postgres-billing:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "8085:8080"
    networks: [goktug-net]
    restart: unless-stopped

  telemetry-consumer:
    build:
      context: .
      dockerfile: telemetry-consumer/Dockerfile
    profiles: ["all"]
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      ELASTICSEARCH_URI: http://elasticsearch:9200
      ES_ENABLED: "true"
      ES_INDEX_PREFIX: telemetry
      COLD_STORAGE_ENABLED: "true"
      COLD_STORAGE_ENDPOINT: http://minio:9000
      COLD_STORAGE_REGION: us-east-1
      COLD_STORAGE_BUCKET: goktug-telemetry
      COLD_STORAGE_ACCESS_KEY: minio
      COLD_STORAGE_SECRET_KEY: minio12345
      OTEL_SERVICE_NAME: telemetry-consumer
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks: [goktug-net]
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    profiles: ["all"]
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      MAIL_FROM: "${MAIL_FROM:-no-reply@goktug.dev}"
      OTEL_SERVICE_NAME: notification-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    depends_on:
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "8087:8080"
    networks: [goktug-net]
    restart: unless-stopped

